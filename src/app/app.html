<app-nav (openVenue)="showInvitation.set(true)"></app-nav>
<main>
  <app-landing *ngIf="!showInvitation()" (openInvitation)="showInvitation.set(true); showQuote.set(true)"></app-landing>
  <app-quote *ngIf="showQuote() && !showVenue()" (revealVenue)="showVenue.set(true)"></app-quote>
  <app-venue *ngIf="showVenue()"></app-venue>
</main>
